  <style>
    .category-page {
      max-width: 1100px;
      margin: 4rem auto;
      padding: 0 2rem 4rem;
    }

    .category-page h1 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .images-grid img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow);
    }

    .images-grid img:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      border-radius: var(--border-radius);
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 1.2rem;
      left: 1.2rem;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      opacity: 0.8;
      transition: opacity var(--transition);
    }

    .lightbox-close:hover { opacity: 1; }

    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      color: white;
      border: none;
      font-size: 2rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: var(--border-radius);
      transition: background var(--transition);
    }

    .lightbox-prev:hover,
    .lightbox-next:hover { background: rgba(255,255,255,0.3); }

    .lightbox-prev { right: 1rem; }
    .lightbox-next { left: 1rem; }

    @media (max-width: 768px) {
      .images-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .images-grid { grid-template-columns: 1fr; }
      .images-grid img { height: 220px; }
    }
  </style>
</head>

  <script>
    const categoryNames = {
      pergolas: 'פרגולות',
      decks:    'דקים',
      fences:   'גדרות ושערים',
      winter:   'סגירות חורף',
      special:  'עבודות עץ מיוחדות',
    };

    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'pergolas';
    const title = categoryNames[cat] || 'גלריה';

    document.getElementById('category-title').textContent = title;
    document.title = `${title} | עץ ובורג`;

    let allImages = [];
    let currentIndex = 0;

    fetch('data/images.json')
      .then(r => r.json())
      .then(data => {
        allImages = data[cat] || [];
        const grid = document.getElementById('images-grid');
        allImages.forEach((url, i) => {
          const img = document.createElement('img');
          img.src = url;
          img.alt = title;
          img.addEventListener('click', () => openLightbox(i));
          grid.appendChild(img);
        });
      });

    // Lightbox
    const lightbox     = document.getElementById('lightbox');
    const lightboxImg  = document.getElementById('lightbox-img');

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = allImages[currentIndex];
      lightbox.classList.add('open');
    }

    document.getElementById('lightbox-close').addEventListener('click', () => {
      lightbox.classList.remove('open');
    });

    document.getElementById('lightbox-prev').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % allImages.length;
      lightboxImg.src = allImages[currentIndex];
    });

    document.getElementById('lightbox-next').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
      lightboxImg.src = allImages[currentIndex];
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.classList.remove('open');
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      lightbox.classList.remove('open');
      if (e.key === 'ArrowRight')  document.getElementById('lightbox-prev').click();
      if (e.key === 'ArrowLeft')   document.getElementById('lightbox-next').click();
    });
  </script>
  <script src="js/main.js"></script>
