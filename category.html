  <style>
    .category-page {
      max-width: 1100px;
      margin: 4rem auto;
      padding: 0 2rem 4rem;
    }

    /* ===== HERO ===== */
    .cat-hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .cat-hero h1 {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--color-primary);
      margin-bottom: 0;
    }

    .cat-hero h1::after {
      content: '';
      display: block;
      width: 80px;
      height: 2px;
      background-color: #b08060;
      margin: 0.9rem auto 2rem;
    }

    .cat-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      text-align: right;
      margin-bottom: 3.5rem;
    }

    .cat-intro p {
      font-size: 1rem;
      line-height: 1.95;
      color: #444;
      margin-bottom: 0.8rem;
    }

    /* ===== BENEFITS ===== */
    .cat-benefits {
      margin-bottom: 4rem;
    }

    .cat-benefits-title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 0;
    }

    .cat-benefits-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background-color: #b08060;
      margin: 0.8rem auto 2.5rem;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid #d8cfc4;
      border-right: 1px solid #d8cfc4;
    }

    .benefit-item {
      padding: 2rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid #d8cfc4;
      border-left: 1px solid #d8cfc4;
    }

    .benefit-item svg {
      width: 30px;
      height: 30px;
      stroke: #888;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-bottom: 0.8rem;
    }

    .benefit-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.5rem;
    }

    .benefit-desc {
      font-size: 0.88rem;
      line-height: 1.75;
      color: #666;
    }

    /* ===== GALLERY ===== */
    .gallery-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--color-secondary);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .images-grid img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow);
    }

    .images-grid img:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      border-radius: var(--border-radius);
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 1.2rem;
      left: 1.2rem;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      opacity: 0.8;
      transition: opacity var(--transition);
    }

    .lightbox-close:hover { opacity: 1; }

    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      color: white;
      border: none;
      font-size: 2rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: var(--border-radius);
      transition: background var(--transition);
    }

    .lightbox-prev:hover,
    .lightbox-next:hover { background: rgba(255,255,255,0.3); }

    .lightbox-prev { right: 1rem; }
    .lightbox-next { left: 1rem; }

    @media (max-width: 768px) {
      .cat-intro { grid-template-columns: 1fr; gap: 0; }
      .benefits-grid { grid-template-columns: repeat(2, 1fr); }
      .images-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .benefits-grid { grid-template-columns: 1fr; }
      .images-grid { grid-template-columns: 1fr; }
      .images-grid img { height: 220px; }
    }
  </style>

          { icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>', title: 'הגנה מפני מזג האוויר', desc: 'מחסום איכותי מפני גשם, רוח וקור — עם שמירה על אוורור וכניסת אור.' },
          { icon: '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>', title: 'עיצוב מותאם לנכס', desc: 'הסגירה מתוכננת להשתלב בצורה הרמונית עם חזית הבניין ועם הסביבה.' },
          { icon: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>', title: 'הרחבת שטח המגורים', desc: 'המרפסת הסגורה הופכת לחלל מחיה נוסף — בין אם כפינת ישיבה, חדר משחקים או חדר עבודה.' },
          { icon: '<polyline points="20 6 9 17 4 12"/>', title: 'התקנה נקייה ומדויקת', desc: 'ביצוע מקצועי עם תשומת לב לאיטום, חיבורים וגימור — כך שהתוצאה תחזיק לאורך שנים.' },
          { icon: '<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>', title: 'מגוון פתרונות', desc: 'סגירות קבועות, נשלפות, מתקפלות ועוד — בהתאמה לגודל ולצרכי המרחב.' },
        ],
      },
      special: {
        intro: [
          'מעבר לקטגוריות הקלאסיות, אנו מבצעים מגוון רחב של עבודות עץ מיוחדות — מדפים, ריהוט מותאם אישית, אלמנטים דקורטיביים ופתרונות אחסון יצירתיים.',
          'אם יש לכם רעיון, חלום או תוכנית — אנו נהפוך אותם למציאות. כל פרויקט מיוחד מקבל יחס אישי ומלא, מהתכנון הראשוני ועד המסירה הסופית.',
        ],
        benefitsTitle: 'למה לבחור בעבודת עץ מיוחדת',
        benefits: [
          { icon: '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>', title: 'ייחודיות ואופי', desc: 'עבודה מותאמת אישית שאין לה עותק שני — פרויקט שמשקף בדיוק את הטעם והסגנון שלכם.' },
          { icon: '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>', title: 'תכנון לפי הצורך', desc: 'כל פרויקט מתוכנן בדיוק לפי המידות, הצרכים והחזון של הלקוח.' },
          { icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>', title: 'חומרים איכותיים', desc: 'שימוש בעץ איכותי בלבד, עם עיבוד וגימור שמבטיחים תוצאה ברמה גבוהה.' },
          { icon: '<polyline points="20 6 9 17 4 12"/>', title: 'גימור מושלם', desc: 'תשומת לב לכל פרט — חיבורים, ליטוש ועיגון — לתוצאה מדויקת ונקייה.' },
          { icon: '<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>', title: 'מחיר הוגן', desc: 'הצעת מחיר שקופה ומדויקת — ללא הפתעות, עם יחס אישי לאורך כל הדרך.' },
          { icon: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', title: 'עמידה בלוחות זמנים', desc: 'הפרויקט מתבצע בזמן שסוכם ונמסר נקי ומוכן לשימוש.' },
        ],
      },
    };

    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'pergolas';
    const title = categoryNames[cat] || 'גלריה';
    const data = categoryData[cat];

    document.getElementById('category-title').textContent = title;
    document.title = `${title} | עץ ובורג`;

    if (data) {
      const introEl = document.getElementById('cat-intro');
      data.intro.forEach(text => {
        const p = document.createElement('p');
        p.textContent = text;
        introEl.appendChild(p);
      });

      document.getElementById('benefits-title').textContent = data.benefitsTitle;

      const benefitsGrid = document.getElementById('benefits-grid');
      data.benefits.forEach(b => {
        const item = document.createElement('div');
        item.className = 'benefit-item';
        item.innerHTML = `
          <svg viewBox="0 0 24 24">${b.icon}</svg>
          <div class="benefit-title">${b.title}</div>
          <div class="benefit-desc">${b.desc}</div>
        `;
        benefitsGrid.appendChild(item);
      });
    }

    let allImages = [];
    let currentIndex = 0;

    fetch('data/images.json')
      .then(r => r.json())
      .then(data => {
        allImages = data[cat] || [];
        const grid = document.getElementById('images-grid');
        allImages.forEach((url, i) => {
          const img = document.createElement('img');
          img.src = url;
          img.alt = title;
          img.addEventListener('click', () => openLightbox(i));
          grid.appendChild(img);
        });
      });

    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = allImages[currentIndex];
      lightbox.classList.add('open');
    }

    document.getElementById('lightbox-close').addEventListener('click', () => lightbox.classList.remove('open'));

    document.getElementById('lightbox-prev').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % allImages.length;
      lightboxImg.src = allImages[currentIndex];
    });

    document.getElementById('lightbox-next').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
      lightboxImg.src = allImages[currentIndex];
    });

    lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     lightbox.classList.remove('open');
      if (e.key === 'ArrowRight') document.getElementById('lightbox-prev').click();
      if (e.key === 'ArrowLeft')  document.getElementById('lightbox-next').click();
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
