  <meta name="description" content="גלריית עבודות עץ ובורג — פרגולות, דקים, גדרות ושערים, סגירות חורף ועבודות עץ מיוחדות.">
  <title>גלריית עבודות | עץ ובורג</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .gallery-section {
      max-width: 1100px;
      margin: 4rem auto;
      padding: 0 2rem;
    }

    .gallery-section h1 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .category-card {
      position: relative;
      height: 280px;
      border-radius: var(--border-radius);
      overflow: hidden;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .category-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .category-card:hover img {
      transform: scale(1.06);
    }

    .category-card-label {
      position: absolute;
      bottom: 0;
      right: 0;
      left: 0;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.65));
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      padding: 2.5rem 1rem 1.2rem;
    }

    /* קלף של 2/3 ברוחב לאחרון אם מספר אי-זוגי */
    @media (max-width: 768px) {
      .categories-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .categories-grid {
        grid-template-columns: 1fr;
      }
      .category-card {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <script>
    const categories = [
      { key: 'pergolas', label: 'פרגולות' },
      { key: 'decks',    label: 'דקים' },
      { key: 'fences',   label: 'גדרות ושערים' },
      { key: 'winter',   label: 'סגירות חורף' },
      { key: 'special',  label: 'עבודות עץ מיוחדות' },
    ];

    fetch('data/images.json')
      .then(r => r.json())
      .then(images => {
        const grid = document.getElementById('categories-grid');
        categories.forEach(({ key, label }) => {
          const firstImage = images[key]?.[0] || '';
          const card = document.createElement('div');
          card.className = 'category-card';
          card.onclick = () => location.href = `category.html?cat=${key}`;
          card.innerHTML = `
            <img src="${firstImage}" alt="${label}">
            <div class="category-card-label">${label}</div>
          `;
          grid.appendChild(card);
        });
      });
  </script>
  <script src="js/main.js"></script>
</body>
